name: A11y (axe-core)

# Story 2.13 — gate accessibilité WCAG 2.1 AA du design system.
# Exécute les tests axe-core + le contrat de contraste à chaque PR
# touchant `packages/ui/**`. Doublon ciblé du job `test` de ci.yml,
# pour bloquer spécifiquement les régressions a11y.

on:
  pull_request:
    branches: [main]
    paths:
      - 'packages/ui/**'
  push:
    branches: [main]
    paths:
      - 'packages/ui/**'

concurrency:
  group: axe-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PNPM_VERSION: '10.33.2'
  NODE_VERSION: '22.12.0'

jobs:
  axe:
    name: axe-core + contraste WCAG 2.1 AA
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --no-frozen-lockfile
      - name: Tests a11y (axe-core) + contraste
        run: pnpm --filter @__SCOPE__/ui exec vitest run a11y contrast
