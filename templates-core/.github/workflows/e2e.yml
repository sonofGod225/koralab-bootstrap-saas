name: e2e

# Gated : déclenchement MANUEL uniquement (workflow_dispatch) tant que la DB de
# test et les secrets ne sont pas configurés côté repo. Ne bloque donc aucune PR.
# Pour activer en continu : ajouter `pull_request` au `on:` ci-dessous + définir
# les secrets `E2E_DATABASE_URL` / `BETTER_AUTH_SECRET`.
on:
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # Le smoke (page /signin) n'a pas besoin de DB ; les specs adossées aux
      # données lisent ces secrets (à définir dans les repo settings).
      DATABASE_URL: ${{ secrets.E2E_DATABASE_URL }}
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm --filter @__SCOPE__/suite exec playwright install --with-deps chromium
      - name: Run e2e
        run: pnpm --filter @__SCOPE__/suite test:e2e
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: apps/suite/playwright-report/
          retention-days: 7
