# Cloudflare Workers config pour apps/api (Hono backend)
# Voir architecture.md step 4 décision compute hosting + step 5 patterns Hono middleware

name = "__PROJECT_SLUG__-api"
main = "src/index.ts"
compatibility_date = "2026-05-14"
compatibility_flags = ["nodejs_compat"]

# === Limits (paid plan recommended pour CPU time 30s) ===
[limits]
cpu_ms = 30000

# === Logs / observabilité ===
[observability]
enabled = true

# === Environnements (cf. Story 1.2 AC : 3 envs explicites) ===
# Note : `wrangler dev` lit les vars ci-dessous (env dev par défaut) + .dev.vars (secrets locaux)
[vars]
ENVIRONMENT = "development"
AXIOM_DATASET = "__PROJECT_SLUG__-logs"
BETTER_AUTH_URL = "http://localhost:9187"
APP_URL = "http://localhost:9100"
# Epic 24 — back-office admin (dev). `ADMIN_IP_WHITELIST` n'est appliquée qu'en
# staging/production (secret), jamais en development.
ADMIN_APP_URL = "http://localhost:9101"

[env.staging]
name = "__PROJECT_SLUG__-api-staging"
vars = { ENVIRONMENT = "staging", AXIOM_DATASET = "__PROJECT_SLUG__-logs", BETTER_AUTH_URL = "https://api.staging.__PROJECT_SLUG__.com", APP_URL = "https://staging.__PROJECT_SLUG__.com", ADMIN_APP_URL = "https://admin.staging.__PROJECT_SLUG__.com" }
routes = [
  { pattern = "api.staging.__PROJECT_SLUG__.com", custom_domain = true }
]

[env.production]
name = "__PROJECT_SLUG__-api-production"
vars = { ENVIRONMENT = "production", AXIOM_DATASET = "__PROJECT_SLUG__-logs", BETTER_AUTH_URL = "https://api.__PROJECT_SLUG__.com", APP_URL = "https://app.__PROJECT_SLUG__.com", ADMIN_APP_URL = "https://admin.__PROJECT_SLUG__.com" }
routes = [
  { pattern = "api.__PROJECT_SLUG__.com", custom_domain = true }
]

# === Bindings ===
# Story 3.1 — KV cache sessions Better-Auth (secondary storage).
# Créer les namespaces puis remplacer les `id` ci-dessous :
#   wrangler kv namespace create SESSIONS_KV
#   wrangler kv namespace create SESSIONS_KV --env staging
#   wrangler kv namespace create SESSIONS_KV --env production
[[kv_namespaces]]
binding = "SESSIONS_KV"
id = "REPLACE_WITH_DEV_KV_ID"

[[env.staging.kv_namespaces]]
binding = "SESSIONS_KV"
id = "REPLACE_WITH_STAGING_KV_ID"

[[env.production.kv_namespaces]]
binding = "SESSIONS_KV"
id = "REPLACE_WITH_PRODUCTION_KV_ID"

# === Epic 5 : R2 Files (logos d'organisation, pièces jointes) ===
# Dev local : miniflare simule le bucket automatiquement.
# Déploiement : wrangler r2 bucket create __PROJECT_SLUG__-files[-staging|-production]
[[r2_buckets]]
binding = "R2"
bucket_name = "__PROJECT_SLUG__-files"

[[env.staging.r2_buckets]]
binding = "R2"
bucket_name = "__PROJECT_SLUG__-files-staging"

[[env.production.r2_buckets]]
binding = "R2"
bucket_name = "__PROJECT_SLUG__-files-production"

